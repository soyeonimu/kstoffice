name: Notion to Jekyll (pirafrank)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Notion to Jekyll
        id: notion_to_jekyll
        uses: pirafrank/notion-to-jekyll@v1
        with:
          notion-token: ${{ secrets.NOTION_TOKEN }}
          notion-database-id: ${{ secrets.NOTION_DATABASE_ID }}
          publish-to-posts: "true"
          posts-dir: "_board"
          relative-date: "0"
          site-url: "https://soyeonimu.github.io/kstoffice"
          assets-dir: "assets/notion"

      - name: Normalize frontmatter and filename
        run: |
          python3 -m pip install --upgrade pip pyyaml unidecode
          # 파일 소유권을 현재 실행 유저로 변경
          sudo chown -R $USER:$USER _board
          
          python3 - << 'PY'
          import os, glob, re, datetime, yaml, shutil
          try:
              from unidecode import unidecode
          except Exception:
              def unidecode(s): return s

          BOARD_DIR = "_board"
          # ✅ permalink/redirect_from 를 KEEP 에 추가해야 재작성 시 살아남는다
          KEEP = ["permalink", "redirect_from", "layout", "title", "date", "category", "description", "keywords"]

          # ✅ 제목 -> 영문 URL 슬러그 매핑 (한글 제목 파일명을 URL로 쓰면 인코딩·길이·404 문제)
          SLUGMAP = {}
          try:
              with open("_data/board_slugs.yml", encoding="utf-8") as f:
                  SLUGMAP = {str(k).strip(): str(v).strip() for k, v in (yaml.safe_load(f) or {}).items()}
          except Exception as e:
              print("slugmap load fail:", e)

          def eng_slug(title):
              t = str(title).strip()
              if t in SLUGMAP:
                  return SLUGMAP[t]
              # fallback: 로마자화(unidecode) -> ascii 슬러그
              s = unidecode(t).lower()
              s = re.sub(r"[^a-z0-9]+", "-", s)
              s = re.sub(r"-{2,}", "-", s).strip("-")
              return s or "post"

          def safe_slug(name: str) -> str:
              name = re.sub(r'\.md$', '', name, flags=re.I)
              name = re.sub(r'^\d{4}[-_]\d{2}[-_]\d{2}[-_ ]*', '', name)
              name = re.sub(r'\s+', '-', name.strip())
              name = re.sub(r'[\\/:*?"<>|]+', '', name)
              name = re.sub(r'-{2,}', '-', name)
              return name.lower() or "untitled"

          def old_urls(title, file_date):
              # 옛 한글 URL(파일명 기반) + 네이버 정규화 변형 -> redirect_from 으로 301 복구
              ks = safe_slug(str(title))
              base = "%s-%s" % (file_date, ks)
              n = re.sub(r"[,'()’‘]", "", base)
              n = re.sub(r"[·—–]", "-", n)
              n = re.sub(r"-{2,}", "-", n).strip("-")
              urls = ["/board/%s/" % base]
              if n != base:
                  urls.append("/board/%s/" % n)
              return urls

          def normalize_date(raw):
              # Jekyll 정렬을 위해 시:분:초를 현재 시간으로 추가
              now = datetime.datetime.now()
              time_str = now.strftime(" %H:%M:%S")
              if raw is None:
                  return now.strftime("%Y-%m-%d") + time_str
              s = str(raw).strip()
              digits = re.sub(r'[^0-9]', '', s)[:8]
              if len(digits) == 8:
                  return f"{digits[:4]}-{digits[4:6]}-{digits[6:8]}" + time_str
              return now.strftime("%Y-%m-%d") + time_str

          def split_frontmatter(text):
              m = re.match(r'^---\s*\n(.*?)\n---\s*\n(.*)$', text, re.DOTALL)
              if not m: return None, None
              return m.group(1), m.group(2)

          def process_file(path):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      content = f.read()

                  fm_raw, body = split_frontmatter(content)
                  if fm_raw is None: return

                  fm = yaml.safe_load(fm_raw) or {}
                  title = fm.get("title") or os.path.basename(path).replace(".md", "")

                  date_val = normalize_date(fm.get("date"))
                  file_date = date_val.split(' ')[0]

                  # ✅ 영문 permalink + 옛 URL redirect_from(기존 것 보존 + 자동 추가)
                  slug = eng_slug(title)
                  red = []
                  exist = fm.get("redirect_from")
                  if isinstance(exist, list): red.extend([str(x) for x in exist])
                  elif isinstance(exist, str): red.append(exist)
                  for u in old_urls(title, file_date):
                      if u not in red: red.append(u)

                  out = {
                      "permalink": "/board/%s/" % slug,
                      "redirect_from": red,
                      "layout": "board-post",
                      "title": str(title).strip(),
                      "date": date_val,
                  }
                  for k in ["category", "description", "keywords"]:
                      if fm.get(k): out[k] = fm.get(k)

                  ordered = {k: out[k] for k in KEEP if k in out}
                  new_fm = "---\n" + yaml.safe_dump(ordered, sort_keys=False, allow_unicode=True).strip() + "\n---\n"
                  new_content = new_fm + body.lstrip()

                  # 파일명은 관리용(한글 유지 OK) — URL은 위 permalink 가 결정
                  fslug = safe_slug(str(title))
                  new_filename = f"{file_date}-{fslug}.md"
                  target_path = os.path.join(os.path.dirname(path), new_filename)

                  with open(path, "w", encoding="utf-8") as f:
                      f.write(new_content)

                  if os.path.abspath(path) != os.path.abspath(target_path):
                      if os.path.exists(target_path):
                          os.remove(target_path)
                      shutil.move(path, target_path)
                  print(f"OK: {new_filename} -> {out['permalink']}")
              except Exception as e:
                  print(f"Error processing {path}: {e}")

          if os.path.isdir(BOARD_DIR):
              for path in glob.glob(os.path.join(BOARD_DIR, "*.md")):
                  process_file(path)
          PY

      - name: Commit & Push
        run: |
          git config user.name "notion-bot"
          git config user.email "notion-bot@users.noreply.github.com"
          git add .
          git commit -m "sync: notion -> jekyll (date-time normalized)" || echo "No changes to commit"
          git pull --rebase origin main
          git push origin main
