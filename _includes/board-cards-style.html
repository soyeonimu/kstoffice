{%- comment -%}
board.htmlмқҳ .post-grid / .post-card / .board-head мҠӨнғҖмқјмқ„ кіөмң мҡ©мңјлЎң м¶”м¶ң.
л¶„м•јлі„ кІҢмӢңнҢҗ нҺҳмқҙм§ҖмҷҖ н—ҲлёҢ мң„м Ҝм—җм„ң board-cards.htmlмқҙ мһҗлҸҷмңјлЎң л¶Ҳлҹ¬мҳЁлӢӨ.
(board.html мӣҗліёмқҖ мһҗмІҙ <style>мқ„ к·ёлҢҖлЎң мң м§Җ вҖ” к°’мқҙ лҸҷмқјн•ҳлҜҖлЎң м¶©лҸҢ м—ҶмқҢ)
мЈјмқҳ: л Ҳмқҙм•„мӣғмқҳ <main>(min-height:80vh)мқ„ лҚ®м§Җ м•ҠлҸ„лЎқ bare main{} м„ нғқмһҗлҠ” л„Јм§Җ м•ҠлҠ”лӢӨ.
      .post-grid мһҗмІҙк°Җ <main> мҡ”мҶҢлқј min-heightлҘј лӘ…мӢңн•ҙ мң„м Ҝмқҙ 80vhлЎң лҠҳм–ҙлӮҳлҠ” кІғмқ„ л§үлҠ”лӢӨ.
{%- endcomment -%}
<style>
  :root { --board-dark: #16273f; --board-gold: #E2C28D; --board-gold-d: #C9A24E; --board-border: #e6e8ec; }

  /* л¶„м•јлі„ кІҢмӢңнҢҗ м»Ён…Ңмқҙл„Ҳ (board.htmlкіј лҸҷмқј) */
  .leaders-board { font-family: 'Pretendard', sans-serif; max-width: 1400px; margin: 0 auto; padding: 24px 32px 48px; }

  /* ===== н—Өл“ң ===== */
  .leaders-board .board-head { padding: 8px 0 22px; border-bottom: 1px solid var(--board-border); margin-bottom: 22px; }
  .leaders-board .board-eyebrow { display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 2px; color: var(--board-gold-d); margin-bottom: 8px; }
  .leaders-board .board-page-title { font-size: clamp(1.6rem, 3.4vw, 2.1rem); font-weight: 800; letter-spacing: -0.02em; margin: 0 0 8px; color: #1a1a1a; }
  .leaders-board .board-page-sub { font-size: 1rem; color: #6b7280; margin: 0; word-break: keep-all; }
  .leaders-board .board-back { display: inline-block; margin-top: 40px; color: var(--board-gold-d); font-weight: 700; text-decoration: none; }
  .leaders-board .board-back:hover { text-decoration: underline; }

  /* ===== м№ҙл“ң к·ёлҰ¬л“ң (board.htmlкіј лҸҷмқј) ===== */
  .post-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 22px; align-items: start; align-content: start; min-height: auto; }
  @media (max-width: 1200px) { .post-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
  @media (max-width: 900px)  { .post-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); } }
  .post-card { display: flex; flex-direction: column; background: #fff; border: 1px solid var(--board-border); border-radius: 14px; overflow: hidden; text-decoration: none; transition: 0.25s; box-shadow: 0 4px 16px rgba(0,0,0,.04); }
  .post-card:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(0,0,0,.09); border-color: var(--board-gold); }
  .post-card-thumb { position: relative; width: 100%; aspect-ratio: 16 / 9; background-size: cover; background-position: center; background-color: #16273f; }
  .post-card-cat { position: absolute; top: 10px; left: 10px; font-size: 11px; font-weight: 700; color: #fff; background: rgba(15,23,42,.82); backdrop-filter: blur(2px); padding: 4px 11px; border-radius: 100px; }
  .post-card-body { display: flex; flex-direction: column; gap: 10px; padding: 16px 18px 20px; }
  .post-card-title { font-size: 1.02rem; font-weight: 700; color: #222; line-height: 1.45; word-break: keep-all; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .post-card-date { color: #9aa0a6; font-size: 13.5px; }

  @media (max-width: 520px) {
    .post-grid { grid-template-columns: 1fr 1fr; gap: 14px; }
    .post-card-body { padding: 12px 13px 16px; }
    .post-card-title { font-size: 0.92rem; }
  }
</style>
