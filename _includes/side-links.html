<style>
  .lds-fab{
    position: fixed;
    right: 18px;
    bottom: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 9999;
  }

  /* 기본 버튼: 라운드 사각 + 컬러 + 그림자, 호버 시 라벨이 왼쪽으로 확장 */
  .lds-fab__btn{
    position: relative;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    height: 58px;
    width: 58px;
    border-radius: 18px;
    background: linear-gradient(135deg, var(--c), var(--c2));
    color: var(--txt);
    text-decoration: none;
    overflow: hidden;
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.18);
    transition: width .32s cubic-bezier(.22,1,.36,1), box-shadow .25s ease, transform .2s ease;
    -webkit-tap-highlight-color: transparent;
  }

  /* 아이콘 칩: 항상 우측 고정 */
  .lds-fab__ic{
    position: absolute;
    right: 0; top: 0;
    width: 58px; height: 58px;
    display: flex; align-items: center; justify-content: center;
  }
  .lds-fab__ic svg{ width: 25px; height: 25px; }

  /* 라벨: 평소엔 아이콘 뒤에 숨고, 호버하면 슬라이드 인 */
  .lds-fab__lbl{
    font-size: 12.5px;
    font-weight: 800;
    line-height: 1.15;
    letter-spacing: -0.02em;
    text-align: left;
    white-space: nowrap;
    padding-left: 16px;
    padding-right: 64px;
    opacity: 0;
    transform: translateX(8px);
    transition: opacity .25s ease, transform .25s ease;
  }

  .lds-fab__btn:hover,
  .lds-fab__btn:focus-visible{
    width: 162px;
    box-shadow: 0 12px 26px color-mix(in srgb, var(--c) 45%, transparent);
    transform: translateY(-2px);
  }
  .lds-fab__btn:hover .lds-fab__lbl,
  .lds-fab__btn:focus-visible .lds-fab__lbl{
    opacity: 1;
    transform: translateX(0);
  }

  /* Primary(진단): 항상 살짝 펼쳐서 시선 유도 + 펄스 */
  .lds-fab__btn.is-primary{
    width: 150px;
    box-shadow: 0 8px 22px rgba(197,160,89,.42);
    animation: ldsFabPulse 2.4s ease-in-out infinite;
  }
  .lds-fab__btn.is-primary .lds-fab__lbl{ opacity: 1; transform: translateX(0); }
  .lds-fab__btn.is-primary:hover{ width: 150px; }

  @keyframes ldsFabPulse{
    0%,100%{ box-shadow: 0 8px 22px rgba(197,160,89,.42); }
    50%{ box-shadow: 0 8px 30px rgba(197,160,89,.75); }
  }

  /* color-mix 미지원 브라우저 폴백 */
  @supports not (background: color-mix(in srgb, red, blue)){
    .lds-fab__btn:hover{ box-shadow: 0 12px 26px rgba(15,23,42,.30); }
  }

  /* 모바일: 크기 축소, 라벨 숨김(아이콘만) */
  @media (max-width: 768px){
    .lds-fab{ right: 12px; bottom: 18px; gap: 10px; }
    .lds-fab__btn{ width: 50px; height: 50px; border-radius: 15px; }
    .lds-fab__ic{ width: 50px; height: 50px; }
    .lds-fab__ic svg{ width: 22px; height: 22px; }
    .lds-fab__btn.is-primary{ width: 50px; animation: none; }
    .lds-fab__btn.is-primary .lds-fab__lbl{ opacity: 0; }
    .lds-fab__btn:hover{ width: 50px; }
    .lds-fab__lbl{ display: none; }
  }
</style>

<!-- ===== 카카오톡 채널 채팅 클릭 추적 (kakao_click) ===== -->
<script>
  function ldsKakaoChat() {
    // GA4/GTM 추적 — 링크는 그대로 pf.kakao.com/_xmkRSG/chat 으로 열림
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "kakao_click",
      page_type: (location.pathname || "/"),
      button_name: "kakao_chat",
      button_location: "floating"
    });
  }
</script>
