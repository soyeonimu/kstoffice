<!-- 플로팅 상담 스피드다이얼 (원형 FAB + 위로 펼침) -->
<div class="lds-sd" id="ldsSd" aria-label="빠른 상담 바로가기">

  <!-- 펼쳐지는 액션 항목들 (아래에서 위로) -->
  <div class="lds-sd__actions" id="ldsSdActions">

    <!-- 상담신청 (미니 폼 팝업 열기) -->
    <button type="button"
            class="lds-sd__item"
            style="--c:#E2C28D; --c2:#F2E3C9; --txt:#0f172a;"
            aria-label="상담신청"
            onclick="ldsSdOpenForm()">
      <span class="lds-sd__lbl">상담신청</span>
      <span class="lds-sd__ic" aria-hidden="true">✍️</span>
    </button>

    <!-- 카카오톡 상담 -->
    <a href="https://pf.kakao.com/_xmkRSG/chat"
       target="_blank" rel="noopener"
       class="lds-sd__item"
       style="--c:#FEE500; --c2:#FDD835; --txt:#3C1E1E;"
       aria-label="카카오톡 상담"
       onclick="ldsKakaoChat()">
      <span class="lds-sd__lbl">카카오톡 상담</span>
      <span class="lds-sd__ic" aria-hidden="true">💬</span>
    </a>

    <!-- 네이버 예약 -->
    <a href="https://naver.me/xwmIDcba"
       target="_blank" rel="noopener"
       class="lds-sd__item"
       style="--c:#03c75a; --c2:#06d96a; --txt:#fff;"
       aria-label="네이버 예약">
      <span class="lds-sd__lbl">네이버 예약</span>
      <span class="lds-sd__ic" aria-hidden="true">📅</span>
    </a>

    <!-- 전화 상담 -->
    <a href="tel:0312256885"
       class="lds-sd__item"
       style="--c:#E2C28D; --c2:#F2E3C9; --txt:#fff;"
       aria-label="전화 상담 031-225-6885">
      <span class="lds-sd__lbl">전화 상담</span>
      <span class="lds-sd__ic" aria-hidden="true">📞</span>
    </a>

    <!-- 개인회생 진단 -->
    <a href="/rehab/self-check"
       class="lds-sd__item"
       style="--c:#0f172a; --c2:#1e293b; --txt:#F2E3C9;"
       aria-label="개인회생 진단">
      <span class="lds-sd__lbl">개인회생 진단</span>
      <span class="lds-sd__ic" aria-hidden="true">⚖️</span>
    </a>

  </div>

  <!-- 메인 FAB 버튼 (평소엔 이것만 노출) -->
  <button type="button"
          class="lds-sd__fab"
          id="ldsSdFab"
          aria-expanded="false"
          aria-controls="ldsSdActions"
          aria-label="퀵메뉴 열기"
          onclick="ldsSdToggle()">
    <span class="lds-sd__fab-open" aria-hidden="true">퀵메뉴</span>
    <span class="lds-sd__fab-close" aria-hidden="true">✕</span>
  </button>

  <!-- 상담신청 미니 폼 팝업 -->
  <div class="lds-sd__form" id="ldsSdForm" aria-hidden="true" role="dialog" aria-label="상담신청">
    <div class="lds-sd__form-card">
      <button type="button" class="lds-sd__form-x" aria-label="닫기" onclick="ldsSdCloseForm()">✕</button>
      <p class="lds-sd__form-title">✍️ 상담신청</p>
      <p class="lds-sd__form-desc">이름과 연락처를 남겨주세요. 곧 연락드리겠습니다.</p>
      <form class="lds-sd__form-body" onsubmit="ldsSdSubmit(event)" autocomplete="off">
        <input type="text" name="name" placeholder="이름" required class="lds-sd__input">
        <input type="tel" name="phone" placeholder="연락처 (010-0000-0000)" required class="lds-sd__input">
        <label class="lds-sd__agree">
          <input type="checkbox" name="agree" required>
          <span>개인정보 수집·이용 동의 (필수) <a href="/privacy" target="_blank" rel="noopener">[보기]</a></span>
        </label>
        <button type="submit" class="lds-sd__submit">신청</button>
        <p class="lds-sd__success" style="display:none">✅ 신청 완료! 곧 연락드리겠습니다.</p>
      </form>
    </div>
  </div>

</div>

<style>
  .lds-sd{
    position: fixed;
    right: 20px;
    bottom: 26px;
    z-index: 9999;
  }

  /* ===== 메인 FAB ===== */
  .lds-sd__fab{
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 64px;
    height: 64px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    background: linear-gradient(135deg, #FF8A00, #F76B00);
    color: #fff;
    box-shadow: 0 10px 24px rgba(247, 107, 0, 0.45);
    transition: transform .28s cubic-bezier(.22,1,.36,1), box-shadow .25s ease;
    -webkit-tap-highlight-color: transparent;
    animation: ldsFabPulse 2.2s ease-out infinite;
  }
  @keyframes ldsFabPulse{
    0%   { box-shadow: 0 10px 24px rgba(247,107,0,.42), 0 0 0 0 rgba(247,107,0,.5); }
    70%  { box-shadow: 0 10px 24px rgba(247,107,0,.42), 0 0 0 15px rgba(247,107,0,0); }
    100% { box-shadow: 0 10px 24px rgba(247,107,0,.42), 0 0 0 0 rgba(247,107,0,0); }
  }
  @media (prefers-reduced-motion: reduce){ .lds-sd__fab{ animation: none; } }
  .lds-sd__fab:hover{
    transform: translateY(-2px);
    box-shadow: 0 14px 30px rgba(247, 107, 0, 0.5);
  }
  .lds-sd__fab-open,
  .lds-sd__fab-close{
    position: absolute;
    font-size: 26px;
    line-height: 1;
    transition: opacity .22s ease, transform .28s ease;
  }
  .lds-sd__fab-open{
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .01em;
    text-align: center;
  }
  .lds-sd__fab-close{
    opacity: 0;
    transform: rotate(-90deg) scale(.6);
    font-size: 24px;
    color: #fff;
  }
  .lds-sd.is-open .lds-sd__fab{
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #F2E3C9;
  }
  .lds-sd.is-open .lds-sd__fab-open{
    opacity: 0;
    transform: rotate(90deg) scale(.6);
  }
  .lds-sd.is-open .lds-sd__fab-close{
    opacity: 1;
    transform: rotate(0) scale(1);
  }

  /* ===== 펼침 항목 컨테이너 ===== */
  .lds-sd__actions{
    position: absolute;
    right: 6px;
    bottom: 72px;
    display: flex;
    flex-direction: column-reverse; /* 아래(FAB 근처)부터 위로 쌓임 */
    align-items: flex-end;
    gap: 12px;
    pointer-events: none;
  }
  .lds-sd.is-open .lds-sd__actions{
    pointer-events: auto;
  }

  /* ===== 개별 액션 항목 ===== */
  .lds-sd__item{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0;
    border: none;
    background: transparent;
    text-decoration: none;
    cursor: pointer;
    opacity: 0;
    transform: translateY(14px) scale(.85);
    transition: opacity .25s ease, transform .3s cubic-bezier(.22,1,.36,1);
    -webkit-tap-highlight-color: transparent;
  }
  .lds-sd.is-open .lds-sd__item{
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  /* 순차 펼침 (아래 항목부터 먼저) */
  .lds-sd.is-open .lds-sd__item:nth-child(1){ transition-delay: .16s; }
  .lds-sd.is-open .lds-sd__item:nth-child(2){ transition-delay: .12s; }
  .lds-sd.is-open .lds-sd__item:nth-child(3){ transition-delay: .08s; }
  .lds-sd.is-open .lds-sd__item:nth-child(4){ transition-delay: .04s; }
  .lds-sd.is-open .lds-sd__item:nth-child(5){ transition-delay: 0s; }

  .lds-sd__lbl{
    font-size: 13px;
    font-weight: 800;
    letter-spacing: -0.02em;
    white-space: nowrap;
    color: #0f172a;
    background: #fff;
    padding: 7px 12px;
    border-radius: 10px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.18);
  }
  .lds-sd__ic{
    display: flex;
    align-items: center;
    justify-content: center;
    width: 46px;
    height: 46px;
    flex: 0 0 46px;
    border-radius: 50%;
    font-size: 20px;
    line-height: 1;
    background: linear-gradient(135deg, var(--c), var(--c2));
    color: var(--txt);
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.22);
  }

  /* ===== 상담신청 미니 폼 팝업 ===== */
  .lds-sd__form{
    position: absolute;
    right: 0;
    bottom: 74px;
    width: 250px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(12px) scale(.96);
    transform-origin: bottom right;
    transition: opacity .22s ease, transform .26s cubic-bezier(.22,1,.36,1), visibility .22s;
  }
  .lds-sd.is-form-open .lds-sd__form{
    opacity: 1;
    visibility: visible;
    transform: translateY(0) scale(1);
  }
  .lds-sd__form-card{
    position: relative;
    background: #0f172a;
    border-radius: 16px;
    padding: 18px 16px 16px;
    box-shadow: 0 16px 34px rgba(15, 23, 42, 0.42);
    border: 1px solid rgba(226,194,141, 0.4);
  }
  .lds-sd__form-x{
    position: absolute;
    top: 10px; right: 10px;
    width: 26px; height: 26px;
    border: none;
    border-radius: 50%;
    background: rgba(255,255,255,0.08);
    color: #F2E3C9;
    font-size: 13px;
    cursor: pointer;
    line-height: 1;
  }
  .lds-sd__form-title{
    margin: 0 0 6px;
    color: #F2E3C9;
    font-weight: 800;
    font-size: 15px;
  }
  .lds-sd__form-desc{
    margin: 0 0 12px;
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    line-height: 1.4;
  }
  .lds-sd__form-body{ display: flex; flex-direction: column; gap: 8px; }
  .lds-sd__input{
    height: 42px;
    padding: 0 12px;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.18);
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
    font-size: 14px;
    box-sizing: border-box;
  }
  .lds-sd__input::placeholder{ color: rgba(255, 255, 255, 0.55); }
  .lds-sd__input:focus{ outline: none; border-color: #E2C28D; }
  .lds-sd__agree{
    display: flex;
    align-items: flex-start;
    gap: 7px;
    font-size: 11.5px;
    line-height: 1.4;
    color: rgba(255, 255, 255, 0.65);
    cursor: pointer;
  }
  .lds-sd__agree input{ margin-top: 1px; accent-color: #E2C28D; flex-shrink: 0; cursor: pointer; }
  .lds-sd__agree a{ color: #F2E3C9; text-decoration: underline; }
  .lds-sd__submit{
    height: 44px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #E2C28D, #F2E3C9);
    color: #0f172a;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }
  .lds-sd__submit:disabled{ opacity: 0.7; cursor: default; }
  .lds-sd__success{
    margin: 4px 0 0;
    font-size: 12.5px;
    font-weight: 700;
    color: #F2E3C9;
  }

  /* ===== 모바일: 컴팩트 ===== */
  @media (max-width: 768px){
    .lds-sd{ right: 14px; bottom: 18px; }
    .lds-sd__fab{ width: 54px; height: 54px; }
    .lds-sd__fab-open{ font-size: 13px; }
    .lds-sd__fab-close{ font-size: 21px; }
    .lds-sd__actions{ bottom: 64px; gap: 10px; }
    .lds-sd__ic{ width: 42px; height: 42px; flex-basis: 42px; font-size: 18px; }
    .lds-sd__lbl{ font-size: 12px; padding: 6px 10px; }
    .lds-sd__form{ width: 220px; bottom: 66px; }
  }
</style>

<!-- ===== 카카오톡 채널 채팅 클릭 추적 (kakao_click) ===== -->
<script>
  function ldsKakaoChat() {
    // GA4/GTM 추적 — 링크는 그대로 pf.kakao.com/_xmkRSG/chat 으로 열림
    window.dataLayer = window.dataLayer || [];
    window.dataLayer.push({
      event: "kakao_click",
      page_type: (location.pathname || "/"),
      button_name: "kakao_chat",
      button_location: "floating"
    });
  }
</script>

<!-- ===== 스피드다이얼 토글 + 상담신청 폼(GAS 전송) ===== -->
<script>
  function ldsSdToggle() {
    var sd = document.getElementById('ldsSd');
    var fab = document.getElementById('ldsSdFab');
    if (!sd) return;
    var open = sd.classList.toggle('is-open');
    if (fab) {
      fab.setAttribute('aria-expanded', open ? 'true' : 'false');
      fab.setAttribute('aria-label', open ? '상담 메뉴 닫기' : '상담 메뉴 열기');
    }
    if (!open) ldsSdCloseForm();
  }

  function ldsSdOpenForm() {
    var sd = document.getElementById('ldsSd');
    var form = document.getElementById('ldsSdForm');
    if (!sd) return;
    sd.classList.add('is-form-open');
    if (form) {
      form.setAttribute('aria-hidden', 'false');
      var first = form.querySelector('input[name="name"]');
      if (first) { try { first.focus(); } catch (e) {} }
    }
  }

  function ldsSdCloseForm() {
    var sd = document.getElementById('ldsSd');
    var form = document.getElementById('ldsSdForm');
    if (!sd) return;
    sd.classList.remove('is-form-open');
    if (form) form.setAttribute('aria-hidden', 'true');
  }

  function ldsSdSubmit(e) {
    e.preventDefault();
    var form = e.target;
    if (form.agree && !form.agree.checked) {
      alert('개인정보 수집·이용에 동의해 주세요.');
      return;
    }
    var btn = form.querySelector('.lds-sd__submit');
    var GAS = "https://script.google.com/macros/s/AKfycbxLHMOghQElDBtKbbMGKFWTYqEQYfIPsUpM2QQUSuDAYDShAu2xqlbOkzpEBtehiPx-Qg/exec";
    btn.textContent = '신청 중...';
    btn.disabled = true;
    var params = new URLSearchParams({
      name: form.name ? form.name.value : '',
      phone: form.phone ? form.phone.value : '',
      concern: '플로팅 상담',
      formType: 'floating',
      source: '플로팅_상담신청'
    });
    var done = function () {
      btn.textContent = '신청 완료 ✓';
      var el = form.querySelector('.lds-sd__success');
      if (el) el.style.display = 'block';
      form.querySelectorAll('input,button').forEach(function (f) { f.disabled = true; });
    };
    fetch(GAS, { method: 'POST', mode: 'no-cors', body: params }).then(done).catch(done);
  }

  /* 바깥 클릭 시 닫기 */
  document.addEventListener('click', function (evt) {
    var sd = document.getElementById('ldsSd');
    if (!sd) return;
    if (sd.contains(evt.target)) return;
    if (sd.classList.contains('is-open') || sd.classList.contains('is-form-open')) {
      sd.classList.remove('is-open');
      sd.classList.remove('is-form-open');
      var fab = document.getElementById('ldsSdFab');
      var form = document.getElementById('ldsSdForm');
      if (fab) {
        fab.setAttribute('aria-expanded', 'false');
        fab.setAttribute('aria-label', '상담 메뉴 열기');
      }
      if (form) form.setAttribute('aria-hidden', 'true');
    }
  });
</script>
